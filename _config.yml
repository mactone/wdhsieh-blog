# Hexo Configuration
# Docs: https://hexo.io/docs/configuration.html

# Site
title: WD Hsieh Blog
subtitle: '燃燒、節能、AI 與個人系統'
description: 關於燃燒工程、節能、氨能源、AI 與個人系統的技術部落格
keywords:
  - blog
  - hexo
  - notes
  - ai
author: WD Hsieh
language: zh-TW
timezone: Asia/Taipei

# URL
url: https://mactone.github.io/wdhsieh-blog
root: /wdhsieh-blog/
permalink: :title/
permalink_defaults:
pretty_urls:
  trailing_index: true
  trailing_html: true

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  preprocess: true
  line_number: true
  tab_replace: ''

# Home page setting
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# Category & Tag
default_category: 筆記
category_map:
tag_map:

# Metadata
meta_generator: true

# Date / Time format
date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: 'mtime'

# Pagination
per_page: 10
pagination_dir: page

# Include / Exclude file(s)
include:
exclude:
ignore:

# Extensions
theme: even

# Feed / sitemap
feed:
  type: atom
  path: atom.xml
  limit: 20
  content: true
sitemap:
  path: sitemap.xml

# Deployment
deploy:
  type: git
  repo: https://github.com/mactone/wdhsieh-blog.git
  branch: gh-pages
